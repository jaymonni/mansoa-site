<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mansoa - Applications</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f7fa;
  color:#111;
}

header {
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.app {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
}

h2 {
  margin-top:0;
}

.button {
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:#2563eb;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

footer {
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#666;
}
</style>

</head>

<body>

<header>
  <h1>Mansoa</h1>
  <p>Mes applications mobiles</p>
</header>

<div class="container">

  <div class="app">
    <h2>Dealio</h2>
    <p>Recherchez rapidement sur plusieurs sites.</p>
    <a class="button" href="https://play.google.com/store/apps/details?id=com.dealio.search">Voir sur Google Play</a> 
  </div>

  <div class="app">
    <h2>Avant / Après</h2>
    <p>Comparez vos transformations en photos.</p>
    <a class="button" href="https://play.google.com/store/apps/details?id=com.xavier.avantapres">Voir sur Google Play</a>
  </div>

  <div class="app">
    <h2>Run & Trail</h2>
    <p>Trouvez et organisez vos courses.</p>
    <a class="button" href="#">Voir sur Google Play</a>
  </div>

</div>

<footer>
  © 2026 Mansoa - Mentions légales à venir
</footer>

</body>
</html>
